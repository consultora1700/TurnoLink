<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b0bec5"/>
      <stop offset="100%" style="stop-color:#78909c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#g)"/>
  <g transform="translate(200,138)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Clean scissors -->
    <ellipse cx="-8" cy="16" rx="7" ry="8"/>
    <ellipse cx="8" cy="16" rx="7" ry="8"/>
    <line x1="-3" y1="10" x2="10" y2="-16"/>
    <line x1="3" y1="10" x2="-10" y2="-16"/>
    <!-- Comb accent -->
    <g opacity="0.4" transform="translate(24,-4)">
      <rect x="0" y="-10" width="6" height="24" rx="1"/>
      <line x1="2" y1="-6" x2="6" y2="-6"/>
      <line x1="2" y1="-2" x2="6" y2="-2"/>
      <line x1="2" y1="2" x2="6" y2="2"/>
      <line x1="2" y1="6" x2="6" y2="6"/>
      <line x1="2" y1="10" x2="6" y2="10"/>
    </g>
  </g>
  <text x="200" y="218" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="16" font-weight="600" opacity="0.95">Agrega tu imagen</text>
  <text x="200" y="240" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="400" opacity="0.65">Mostra tu estilo</text>
