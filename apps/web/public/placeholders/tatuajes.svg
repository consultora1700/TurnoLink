  </defs>
  <rect width="400" height="400" rx="16" fill="url(#g)"/>
  <g transform="translate(200,134)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
