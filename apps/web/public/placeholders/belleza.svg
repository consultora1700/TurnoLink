<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c8e4"/>
      <stop offset="100%" style="stop-color:#d4a0cc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#g)"/>
  <g transform="translate(200,140)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Hand mirror -->
    <circle cx="0" cy="-12" r="16"/>
    <circle cx="0" cy="-12" r="11" opacity="0.3" fill="#fff"/>
    <line x1="0" y1="4" x2="0" y2="24"/>
    <ellipse cx="0" cy="26" rx="5" ry="3" fill="#fff" opacity="0.25"/>
    <!-- Sparkle -->
    <line x1="22" y1="-24" x2="22" y2="-18" stroke-width="1.5" opacity="0.5"/>
    <line x1="19" y1="-21" x2="25" y2="-21" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="200" y="218" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="16" font-weight="600" opacity="0.95">Agrega tu imagen</text>
  <text x="200" y="240" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="400" opacity="0.65">Mostra tu mejor trabajo</text>
</svg>
