<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4cfe8"/>
      <stop offset="100%" style="stop-color:#97aad4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#g)"/>
  <g transform="translate(200,136)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Desk with laptop -->
    <rect x="-30" y="8" width="60" height="4" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="-30" y="8" width="60" height="4" rx="2"/>
    <!-- Laptop screen -->
    <rect x="-14" y="-14" width="28" height="20" rx="2"/>
    <rect x="-10" y="-10" width="20" height="12" rx="1" fill="#fff" opacity="0.15"/>
    <!-- Laptop base -->
    <path d="M-16,6 L-14,6 L14,6 L16,6"/>
    <!-- Chair hint -->
    <path d="M-26,12 L-26,28" opacity="0.4"/>
    <path d="M26,12 L26,28" opacity="0.4"/>
  </g>
  <text x="200" y="218" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="16" font-weight="600" opacity="0.95">Agrega tu imagen</text>
  <text x="200" y="240" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="400" opacity="0.65">Mostra tu espacio</text>
</svg>
