<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DB0C0"/>
      <stop offset="35%" stop-color="#3F8697"/>
      <stop offset="100%" stop-color="#2D5E6D"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="44" fill="url(#bg)"/>
  <!-- TURNO text - white -->
  <text x="256" y="248" text-anchor="middle" font-family="Inter, Arial Black, sans-serif" font-weight="900" font-size="160" letter-spacing="-4" fill="white">TURNO</text>
  <!-- LINK text - pink -->
  <text x="256" y="408" text-anchor="middle" font-family="Inter, Arial Black, sans-serif" font-weight="900" font-size="160" letter-spacing="-2" fill="rgba(255,215,235,0.95)">LINK</text>
</svg>
